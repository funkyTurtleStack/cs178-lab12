<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzing, {{ word }}!</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        h1 {
            font-size: 2em;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .nav {
            margin-top: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>Analyzing, {{ word }}</h1>
    <p>
        Word: {{word}}<br>
        Number of Characters: {{characterCount}}<br>
        Number of Vowels: {{vowelCount}}
    </p>
</body>
</html>
